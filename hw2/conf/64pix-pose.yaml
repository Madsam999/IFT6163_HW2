defaults:
  - dataset: libero

# Model selection: 'simple' for Part 1, 'dreamer' for Part 3/4
model_type: 'simple'

# IMPORTANT: Set these to false to train the World Model first
use_random_data: false 
use_policy: false 

# Add this at the very bottom of 64pix-pose.yaml
testing: false
max_iters: 100
eval_vid_iters: 10

policy:
  sequence_length: 16
  action_stacking: 1
  obs_stacking: 1

# Loss coefficients for model training (Part 1.2)
loss_coeffs:
  pred_coeff: 1.0
  dyn_coeff: 1.0
  rep_coeff: 0.1

# CEM Planner parameters (Part 1.3)
planner:
  type: 'cem'           # Added this key so your command works
  horizon: 10           # Matches your command
  num_iterations: 3
  num_samples: 100
  num_elites: 10
  temperature: 0.1
  learning_rate: 0.001

experiment:
  name: q1_simple_cem
  project: mini-grp
  description: "simple env with 64pix images and pose data"

# Model architecture for the backbone
model: 
  type: "dense"         # Changed to dense for SimpleWorldModel (MLP)

batch_size: 256
learning_rate: 3e-4
device: "cuda"

# Simulation / Environment settings
sim:
  eval_episodes: 1
  episode_length: 100
  task_set: "libero_spatial"

image_shape: [64, 64, 3]
action_dim: 7